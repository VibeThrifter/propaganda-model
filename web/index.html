<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Propagandamodel — Nederlandse Politiek &amp; Media</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:           #0a0a0f;
  --bg-panel:     rgba(16, 16, 24, 0.92);
  --bg-card:      rgba(24, 24, 36, 0.85);
  --bg-hover:     rgba(40, 40, 60, 0.6);
  --border:       rgba(255,255,255,0.06);
  --border-light: rgba(255,255,255,0.12);
  --text:         #e8e8f0;
  --text-dim:     #8888a0;
  --text-muted:   #5a5a70;
  --accent:       #6c8aff;
  --c-eigendom:    #e74c3c;
  --c-advertentie: #f0a030;
  --c-sourcing:    #3498db;
  --c-flak:        #9b59b6;
  --c-ideologie:   #2ecc71;
  --c-systeemactor:#e8c547;
  --c-cross_filter:#fd79a8;
  --c-overig:      #7f8c9a;
  --panel-w: 320px;
  --topbar-h: 56px;
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  font-size: 13px;
  line-height: 1.5;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
}

/* TOPBAR */
#topbar {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--topbar-h);
  background: var(--bg-panel);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 24px; z-index: 100; gap: 16px;
}
#topbar h1 {
  font-size: 15px; font-weight: 600; letter-spacing: -0.02em; white-space: nowrap;
  background: linear-gradient(135deg, var(--text) 0%, var(--text-dim) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
#topbar .subtitle { font-size: 11px; color: var(--text-muted); white-space: nowrap; }

/* Main model toggle */
.model-toggle {
  display: flex;
  background: rgba(255,255,255,0.04);
  border-radius: 8px;
  border: 1px solid var(--border);
  overflow: hidden;
  margin-left: 16px;
}
.model-toggle button {
  padding: 6px 14px;
  font-size: 12px; font-weight: 600;
  border: none; background: transparent;
  color: var(--text-muted); cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.model-toggle button.active {
  background: rgba(108,138,255,0.18);
  color: var(--accent);
}
.model-toggle button:hover:not(.active) { background: var(--bg-hover); color: var(--text-dim); }

.search-box { flex: 0 1 260px; position: relative; margin-left: auto; }
.search-box input {
  width: 100%; background: rgba(255,255,255,0.05);
  border: 1px solid var(--border); border-radius: 8px;
  padding: 8px 12px 8px 34px; color: var(--text);
  font-size: 13px; outline: none; transition: border-color 0.2s, background 0.2s;
}
.search-box input:focus { border-color: var(--accent); background: rgba(255,255,255,0.08); }
.search-box .search-icon {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  color: var(--text-muted); font-size: 14px; pointer-events: none;
}
.stats { display: flex; gap: 16px; font-size: 11px; color: var(--text-muted); white-space: nowrap; }
.stats .num { color: var(--text-dim); font-weight: 600; font-variant-numeric: tabular-nums; }

/* SIDEBAR */
#sidebar {
  position: fixed; top: var(--topbar-h); left: 0; bottom: 0;
  width: var(--panel-w); background: var(--bg-panel);
  backdrop-filter: blur(20px); border-right: 1px solid var(--border);
  overflow-y: auto; z-index: 90; padding: 16px;
  display: flex; flex-direction: column; gap: 20px;
}
#sidebar::-webkit-scrollbar { width: 4px; }
#sidebar::-webkit-scrollbar-track { background: transparent; }
#sidebar::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 2px; }

.panel-section h3 {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 10px;
}

.filter-group { display: flex; flex-wrap: wrap; gap: 6px; }

.filter-chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 10px; border-radius: 6px;
  font-size: 11px; font-weight: 500; cursor: pointer;
  border: 1px solid var(--border); background: transparent;
  color: var(--text-dim); transition: all 0.2s; user-select: none;
}
.filter-chip:hover { background: var(--bg-hover); }
.filter-chip.active {
  border-color: var(--chip-color, var(--accent));
  background: color-mix(in srgb, var(--chip-color, var(--accent)) 15%, transparent);
  color: var(--text);
}
.filter-chip .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--chip-color, var(--text-muted)); flex-shrink: 0; }

.legend-item { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 11px; color: var(--text-dim); }
.legend-item .swatch { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
.legend-item .count { margin-left: auto; font-variant-numeric: tabular-nums; color: var(--text-muted); font-size: 10px; }

.slider-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.slider-row label { font-size: 11px; color: var(--text-dim); min-width: 70px; }
.slider-row input[type="range"] { flex: 1; accent-color: var(--accent); height: 4px; }
.slider-row .val { font-size: 10px; color: var(--text-muted); min-width: 28px; text-align: right; font-variant-numeric: tabular-nums; }

.view-toggle {
  display: flex; background: rgba(255,255,255,0.04); border-radius: 8px;
  border: 1px solid var(--border); overflow: hidden;
}
.view-toggle button {
  flex: 1; padding: 7px 12px; font-size: 11px; font-weight: 500;
  border: none; background: transparent; color: var(--text-muted);
  cursor: pointer; transition: all 0.2s;
}
.view-toggle button.active { background: rgba(108,138,255,0.15); color: var(--accent); }
.view-toggle button:hover:not(.active) { background: var(--bg-hover); color: var(--text-dim); }

/* DETAIL PANEL */
#detail {
  position: fixed; top: var(--topbar-h); right: 0; bottom: 0;
  width: 380px; background: var(--bg-panel); backdrop-filter: blur(20px);
  border-left: 1px solid var(--border); overflow-y: auto; z-index: 90;
  padding: 24px; transform: translateX(100%);
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
}
#detail.open { transform: translateX(0); }
#detail::-webkit-scrollbar { width: 4px; }
#detail::-webkit-scrollbar-track { background: transparent; }
#detail::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 2px; }

#detail .close-btn {
  position: absolute; top: 16px; right: 16px;
  background: rgba(255,255,255,0.06); border: 1px solid var(--border);
  color: var(--text-dim); width: 28px; height: 28px; border-radius: 6px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 14px; transition: all 0.2s;
}
#detail .close-btn:hover { background: rgba(255,255,255,0.1); color: var(--text); }

.detail-header { margin-bottom: 20px; padding-right: 36px; }
.detail-header .entity-type { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
.detail-header h2 { font-size: 18px; font-weight: 600; letter-spacing: -0.02em; line-height: 1.3; }
.detail-description { font-size: 12px; color: var(--text-dim); line-height: 1.6; margin-bottom: 16px; }
.detail-section { margin-bottom: 16px; }
.detail-section h4 { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 8px; }

.relation-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
  padding: 10px 12px; margin-bottom: 6px; cursor: pointer; transition: all 0.2s;
}
.relation-card:hover { background: var(--bg-hover); border-color: var(--border-light); }
.relation-card .rel-name { font-size: 12px; font-weight: 500; margin-bottom: 2px; }
.relation-card .rel-meta { font-size: 10px; color: var(--text-muted); display: flex; gap: 10px; }

.score-bar { display: inline-flex; align-items: center; gap: 4px; }
.score-bar .bar-track { width: 40px; height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
.score-bar .bar-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }

/* GRAPH */
#graph-container { position: fixed; top: var(--topbar-h); left: var(--panel-w); right: 0; bottom: 0; overflow: hidden; }
#graph-container svg { width: 100%; height: 100%; }

.tooltip {
  position: fixed; pointer-events: none;
  background: var(--bg-panel); backdrop-filter: blur(16px);
  border: 1px solid var(--border-light); border-radius: 8px;
  padding: 10px 14px; font-size: 12px; max-width: 320px;
  z-index: 200; opacity: 0; transition: opacity 0.15s; box-shadow: var(--shadow);
}
.tooltip.visible { opacity: 1; }
.tooltip .tt-name { font-weight: 600; font-size: 13px; margin-bottom: 2px; }
.tooltip .tt-type { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
.tooltip .tt-desc { color: var(--text-dim); font-size: 11px; line-height: 1.5; }

.zoom-controls { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 4px; z-index: 80; }
.zoom-controls button {
  width: 36px; height: 36px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--bg-panel);
  backdrop-filter: blur(12px); color: var(--text-dim);
  font-size: 16px; cursor: pointer; display: flex;
  align-items: center; justify-content: center; transition: all 0.2s;
}
.zoom-controls button:hover { background: var(--bg-hover); color: var(--text); border-color: var(--border-light); }

.help-hint {
  position: fixed; bottom: 20px; left: calc(var(--panel-w) + 20px);
  font-size: 11px; color: var(--text-muted); z-index: 80; opacity: 0.6;
}

/* Mechanism edge labels */
.edge-label {
  font-size: 9px;
  fill: var(--text-muted);
  text-anchor: middle;
  pointer-events: none;
  text-shadow: 0 0 6px var(--bg), 0 0 3px var(--bg);
}

/* Temporal badge */
.temporal-badge {
  display: inline-block; padding: 2px 8px; border-radius: 4px;
  font-size: 10px; font-weight: 600; margin-top: 4px;
}
.temporal-badge.active { background: rgba(46,204,113,0.15); color: #2ecc71; }
.temporal-badge.inactive { background: rgba(231,76,60,0.15); color: #e74c3c; }
.temporal-period { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

/* DISCUSSIEBOOM */
.arg-tree { margin-top: 8px; }

.arg-node {
  position: relative;
  margin-left: 16px;
  padding: 8px 10px;
  border-left: 2px solid var(--border);
  margin-bottom: 4px;
}
.arg-node.root { margin-left: 0; border-left: none; }
.arg-node.depth-0 { border-left: none; margin-left: 0; }

.arg-node .arg-header {
  display: flex; align-items: center; gap: 6px; margin-bottom: 4px;
}
.arg-stance {
  display: inline-flex; align-items: center; justify-content: center;
  width: 18px; height: 18px; border-radius: 4px;
  font-size: 12px; font-weight: 700; flex-shrink: 0;
}
.arg-stance.supporting { background: rgba(46,204,113,0.2); color: #2ecc71; }
.arg-stance.contradicting { background: rgba(231,76,60,0.2); color: #e74c3c; }
.arg-stance.contextual { background: rgba(108,138,255,0.2); color: #6c8aff; }

.arg-claim {
  font-size: 12px; font-weight: 500; color: var(--text); line-height: 1.4;
}
.arg-reasoning {
  font-size: 11px; color: var(--text-dim); line-height: 1.5; margin-top: 4px;
}
.arg-weight {
  font-size: 10px; color: var(--text-muted); margin-top: 2px;
}
.arg-citations {
  margin-top: 6px; padding-left: 8px; border-left: 1px solid var(--border);
}
.arg-citation {
  font-size: 10px; color: var(--text-muted); margin-bottom: 4px; line-height: 1.4;
}
.arg-citation .cite-source { color: var(--text-dim); font-weight: 500; }
.arg-citation .cite-quote { font-style: italic; color: var(--text-dim); }

.arg-children { margin-top: 4px; }

.arg-toggle {
  background: none; border: none; color: var(--text-muted); cursor: pointer;
  font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-top: 4px;
}
.arg-toggle:hover { background: var(--bg-hover); color: var(--text-dim); }

/* Argument formulier */
.arg-form {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border-light);
  border-radius: 8px;
  padding: 12px;
  margin-top: 8px;
}
.arg-form h5 {
  font-size: 11px; font-weight: 600; color: var(--text-dim); margin-bottom: 10px;
}
.arg-form .form-row {
  margin-bottom: 8px;
}
.arg-form label {
  display: block; font-size: 10px; font-weight: 600; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px;
}
.arg-form input[type="text"],
.arg-form textarea,
.arg-form select {
  width: 100%; background: rgba(255,255,255,0.05);
  border: 1px solid var(--border); border-radius: 6px;
  padding: 7px 10px; color: var(--text); font-size: 12px;
  font-family: inherit; outline: none; transition: border-color 0.2s;
}
.arg-form input:focus, .arg-form textarea:focus, .arg-form select:focus {
  border-color: var(--accent);
}
.arg-form textarea { resize: vertical; min-height: 50px; }
.arg-form select { appearance: auto; }
.arg-form select option { background: #1a1a2e; color: var(--text); }

.stance-picker {
  display: flex; gap: 4px;
}
.stance-picker button {
  flex: 1; padding: 6px 8px; border-radius: 6px; font-size: 11px; font-weight: 600;
  border: 1px solid var(--border); background: transparent;
  color: var(--text-muted); cursor: pointer; transition: all 0.2s;
}
.stance-picker button:hover { background: var(--bg-hover); }
.stance-picker button.selected-sup { border-color: #2ecc71; background: rgba(46,204,113,0.15); color: #2ecc71; }
.stance-picker button.selected-con { border-color: #e74c3c; background: rgba(231,76,60,0.15); color: #e74c3c; }
.stance-picker button.selected-ctx { border-color: #6c8aff; background: rgba(108,138,255,0.15); color: #6c8aff; }

.arg-form .btn-submit {
  width: 100%; padding: 8px; border-radius: 6px; border: none;
  background: rgba(108,138,255,0.2); color: var(--accent);
  font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s;
  margin-top: 4px;
}
.arg-form .btn-submit:hover { background: rgba(108,138,255,0.35); }
.arg-form .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }

.arg-form .btn-cancel {
  width: 100%; padding: 6px; border-radius: 6px; border: none;
  background: transparent; color: var(--text-muted);
  font-size: 11px; cursor: pointer; margin-top: 4px;
}
.arg-form .btn-cancel:hover { color: var(--text-dim); }

.reply-btn {
  background: none; border: none; color: var(--text-muted); cursor: pointer;
  font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-top: 2px;
}
.reply-btn:hover { background: var(--bg-hover); color: var(--accent); }

.form-message {
  font-size: 11px; padding: 6px 8px; border-radius: 4px; margin-top: 6px;
}
.form-message.success { background: rgba(46,204,113,0.1); color: #2ecc71; }
.form-message.error { background: rgba(231,76,60,0.1); color: #e74c3c; }

.arg-summary {
  display: flex; gap: 10px; font-size: 10px; color: var(--text-muted);
  margin-bottom: 8px; padding: 6px 8px;
  background: rgba(255,255,255,0.02); border-radius: 6px;
}
.arg-summary .count { font-weight: 600; }
.arg-summary .count.sup { color: #2ecc71; }
.arg-summary .count.con { color: #e74c3c; }
.arg-summary .count.ctx { color: #6c8aff; }

@media (max-width: 900px) {
  :root { --panel-w: 0px; }
  #sidebar { display: none; }
}

/* TOEVOEGEN-KNOP + MODAL */
.add-btn {
  background: rgba(108,138,255,0.18); border: 1px solid rgba(108,138,255,0.4);
  color: var(--accent); padding: 6px 14px; border-radius: 6px; cursor: pointer;
  font-size: 12px; font-weight: 600; white-space: nowrap; transition: all 0.2s;
}
.add-btn:hover { background: rgba(108,138,255,0.32); }

.modal-overlay {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
  display: none; align-items: flex-start; justify-content: center;
  padding: 80px 16px 16px; overflow-y: auto;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg-panel); border: 1px solid var(--border-light);
  border-radius: 12px; box-shadow: var(--shadow);
  width: 100%; max-width: 460px; padding: 0 0 18px;
}
.modal-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px 12px; border-bottom: 1px solid var(--border);
}
.modal-head h3 { font-size: 14px; font-weight: 600; }
.modal-close {
  background: none; border: none; color: var(--text-dim); cursor: pointer;
  font-size: 22px; line-height: 1; padding: 0 4px;
}
.modal-close:hover { color: var(--text); }
.modal-tabs { display: flex; gap: 6px; padding: 12px 20px 0; }
.modal-tabs button {
  flex: 1; background: var(--bg-card); border: 1px solid var(--border);
  color: var(--text-dim); padding: 8px; border-radius: 6px; cursor: pointer;
  font-size: 12px; font-weight: 600; transition: all 0.2s;
}
.modal-tabs button.active { background: rgba(108,138,255,0.18); border-color: rgba(108,138,255,0.4); color: var(--accent); }
.modal .arg-form { margin: 14px 20px 0; padding: 0; background: none; border: none; }
.modal .arg-form input[type="number"],
.modal .arg-form input[type="date"] {
  width: 100%; background: var(--bg-card); border: 1px solid var(--border-light);
  border-radius: 6px; color: var(--text); padding: 7px 9px; font-size: 12px;
  font-family: inherit;
}
.modal .arg-form .checkbox-row { display: flex; align-items: center; gap: 8px; }
.modal .arg-form .checkbox-row input { width: auto; }
.modal .arg-form .form-row.two { display: flex; gap: 10px; }
.modal .arg-form .form-row.two > div { flex: 1; }
</style>
</head>
<body>

<header id="topbar">
  <h1>Propagandamodel</h1>
  <span class="subtitle">NL Politiek &amp; Media</span>
  <div class="model-toggle" id="modelToggle">
    <button class="active" data-model="instance">Instanties</button>
    <button data-model="theory">Theoretisch Model</button>
  </div>
  <div class="search-box">
    <span class="search-icon">&#x1F50D;</span>
    <input type="text" id="search" placeholder="Zoek..." autocomplete="off" spellcheck="false">
  </div>
  <button id="addBtn" class="add-btn" title="Entiteit of relatie toevoegen">+ Toevoegen</button>
  <div class="stats" id="stats"></div>
</header>

<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-head">
      <h3>Toevoegen aan het model</h3>
      <button class="modal-close" id="addModalClose" title="Sluiten">&times;</button>
    </div>
    <div class="modal-tabs">
      <button data-addtab="entity" class="active">Entiteit</button>
      <button data-addtab="relation">Relatie</button>
    </div>
    <div id="addModalBody"></div>
  </div>
</div>

<aside id="sidebar">
  <div class="panel-section" id="colorModeSection">
    <h3>Kleuring</h3>
    <div class="view-toggle" id="viewToggle">
      <button class="active" data-mode="filter">Filter</button>
      <button data-mode="type">Type</button>
    </div>
  </div>
  <div class="panel-section">
    <h3>Filters (Chomsky/Herman)</h3>
    <div class="filter-group" id="filterChips"></div>
  </div>
  <div class="panel-section" id="timelineSection">
    <h3>Tijdlijn</h3>
    <div class="slider-row">
      <label id="timeLabel" style="min-width:90px">Alle jaren</label>
      <input type="range" id="timeSlider" min="0" max="1" step="1" value="0">
    </div>
    <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text-muted);margin-top:-2px">
      <span id="timeMin">—</span>
      <span id="timeMax">—</span>
    </div>
  </div>
  <div class="panel-section" id="sliderSection">
    <h3>Drempelwaarden</h3>
    <div class="slider-row">
      <label>Zekerheid</label>
      <input type="range" id="certSlider" min="0" max="1" step="0.05" value="0">
      <span class="val" id="certVal">0</span>
    </div>
    <div class="slider-row">
      <label>Invloed</label>
      <input type="range" id="inflSlider" min="0" max="1" step="0.05" value="0">
      <span class="val" id="inflVal">0</span>
    </div>
  </div>
  <div class="panel-section" id="legendSection">
    <h3>Legenda</h3>
    <div id="legend"></div>
  </div>
</aside>

<div id="detail">
  <button class="close-btn" id="detailClose">&times;</button>
  <div id="detailContent"></div>
</div>

<div id="graph-container">
  <svg id="graph"></svg>
</div>

<div class="zoom-controls">
  <button id="zoomIn" title="Zoom in">+</button>
  <button id="zoomOut" title="Zoom uit">&minus;</button>
  <button id="zoomFit" title="Pas in scherm">&#x2922;</button>

const PROPERTY_LABELS = {

  certainty: 'Zekerheid', influence: 'Invloed', relation_type: 'Relatietype',
  description: 'Beschrijving', type: 'Entiteittype', role: 'Rol'

  ongecontroleerd: '?', bronvermelding_nodig: '!', betwist: '⚡',
  geverifieerd: '✓', verouderd: '⏳'
};
const STATUS_COLORS = {

function countStances(args) {
  let sup = 0, con = 0, ctx = 0;
  function walk(list) {
    list.forEach(a => {
      if (a.stance === 'supporting') sup++;
      else if (a.stance === 'contradicting') con++;
      else ctx++;
      walk(a.children);
    });
  }
  walk(args);
  return { sup, con, ctx, total: sup + con + ctx };
}

function renderArgTree(args) {
  if (!args || !args.length) return '';
  const counts = countStances(args);

  let html = `<div class="arg-summary">
    <span><span class="count">${counts.total}</span> argumenten</span>
    <span><span class="count sup">${counts.sup}</span> voor</span>
    <span><span class="count con">${counts.con}</span> tegen</span>
    <span><span class="count ctx">${counts.ctx}</span> context</span>
  </div>`;
  html += '<div class="arg-tree">';
  args.forEach(a => { html += renderArgNode(a, 0); });
  html += '</div>';
  return html;
}

function renderArgNode(arg, depth) {
  const cites = citationsByArg[arg.id] || [];
  const hasChildren = arg.children.length > 0;
  const depthClass = depth === 0 ? 'root' : '';

  const propLabel = arg.property ? PROPERTY_LABELS[arg.property] || arg.property : null;
  const propBadge = propLabel ? `<span style="font-size:9px;padding:1px 5px;border-radius:3px;background:rgba(108,138,255,0.12);color:var(--accent);margin-right:2px">${propLabel}${arg.property_value ? ': '+arg.property_value : ''}</span>` : '';
  const statusSym = arg.status ? STATUS_LABELS[arg.status] || '' : '';
  const statusCol = arg.status ? STATUS_COLORS[arg.status] || 'var(--text-muted)' : '';
  const statusBadge = statusSym ? `<span style="font-size:10px;color:${statusCol}" title="${arg.status}">${statusSym}</span>` : '';

  let html = `<div class="arg-node ${depthClass} depth-${depth}">
    <div class="arg-header">
      <span class="arg-stance ${arg.stance}">${STANCE_SYMBOLS[arg.stance]}</span>
      ${propBadge}
      <span class="arg-claim">${arg.claim}</span>
      ${statusBadge}
    </div>`;

  if (arg.reasoning) {
    html += `<div class="arg-reasoning">${arg.reasoning}</div>`;
  }
  if (arg.weight != null) {
    html += `<div class="arg-weight">Gewicht: ${(arg.weight * 100).toFixed(0)}%</div>`;
  }

  if (cites.length) {
    html += '<div class="arg-citations">';
    cites.forEach(c => {
      html += `<div class="arg-citation">`;
      html += `<span class="cite-source">${c.source_author || ''} — ${c.source_title || ''}</span>`;
      if (c.page) html += ` <span>(${c.page})</span>`;
      if (c.quote) html += `<br><span class="cite-quote">"${c.quote}"</span>`;
      html += `</div>`;
    });
    html += '</div>';
  }

  // Reageer-knop en slot
  const relId = arg.relation_id || '';
  const entId = arg.entity_id || '';
  html += `<button class="reply-btn" onclick="showReplyForm(${arg.id}, ${relId || 'null'}, ${entId || 'null'})">↩ Reageer</button>`;
  html += `<div id="reply-slot-${arg.id}"></div>`;

  if (hasChildren) {
    html += '<div class="arg-children">';
    arg.children.forEach(child => { html += renderArgNode(child, depth + 1); });
    html += '</div>';
  }

  html += '</div>';
  return html;
}

async function submitArgument(formId, opts) {
  const picker = document.getElementById(formId + '-stance');
  const stance = picker.dataset.stance;
  const claim = document.getElementById(formId + '-claim').value.trim();
  const reasoning = document.getElementById(formId + '-reasoning').value.trim();
  const property = document.getElementById(formId + '-property').value || null;
  const propVal = document.getElementById(formId + '-propval').value.trim() || null;
  const weightRaw = document.getElementById(formId + '-weight').value.trim();
  const name = document.getElementById(formId + '-name').value.trim() || 'anoniem';
  const msgEl = document.getElementById(formId + '-msg');

  if (!stance) { msgEl.innerHTML = '<div class="form-message error">Kies een positie (voor/tegen/context)</div>'; return; }
  if (!claim) { msgEl.innerHTML = '<div class="form-message error">Bewering is verplicht</div>'; return; }

  const weight = weightRaw ? Math.min(100, Math.max(0, parseInt(weightRaw))) / 100 : null;

  const body = {
    relation_id: opts.relation_id || null,
    entity_id: opts.entity_id || null,
    parent_argument_id: opts.parent_argument_id || null,
    stance, claim, reasoning: reasoning || null,
    property, property_value: propVal,
    weight, contributed_by: name,
  };

  try {
    const resp = await fetch('/api/arguments', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const result = await resp.json();
    if (!resp.ok) {
      msgEl.innerHTML = `<div class="form-message error">${result.error || 'Fout bij opslaan'}</div>`;
      return;
    }
    msgEl.innerHTML = '<div class="form-message success">Argument toegevoegd!</div>';

    // Herlaad de discussieboom na 500ms
    setTimeout(() => {
      if (opts.relation_id) {
        reloadRelationDiscussion(opts.relation_id);
      } else if (opts.entity_id) {
        reloadEntityDiscussion(opts.entity_id);
      }
    }, 500);
  } catch (e) {
    msgEl.innerHTML = `<div class="form-message error">Netwerkfout: ${e.message}</div>`;
  }
}

async function reloadRelationDiscussion(relationId) {
  try {
    const resp = await fetch(`/api/arguments?relation_id=${relationId}`);
    const args = await resp.json();
    // Rebuild tree
    const roots = buildTreeFromApi(args);
    argsByRelation[relationId] = roots;
    // Re-render: find the current relation and re-select it
    const rel = currentLinks.find(l => l.id === relationId) || DATA.relations.find(l => l.id === relationId);
    if (rel) selectRelation(rel);
  } catch (e) { console.error('Reload failed', e); }
}

async function reloadEntityDiscussion(entityId) {
  try {
    const resp = await fetch(`/api/arguments?entity_id=${entityId}`);
    const args = await resp.json();
    const roots = buildTreeFromApi(args);
    argsByEntity[entityId] = roots;
    const node = currentNodes.find(n => n.id === entityId);
    if (node) selectNode(node);
  } catch (e) { console.error('Reload failed', e); }
}

function buildTreeFromApi(args) {
  const map = new Map();
  args.forEach(a => { a.children = []; map.set(a.id, a); });
  // Index citaties naar het formaat dat renderArgNode verwacht
  args.forEach(a => { citationsByArg[a.id] = a.citations || []; });
  const roots = [];
  args.forEach(a => {
    if (a.parent_argument_id && map.has(a.parent_argument_id)) {
      map.get(a.parent_argument_id).children.push(a);
    } else {
      roots.push(a);
    }
  });
  return roots;
}

  container.innerHTML = renderArgForm({

    parent_argument_id: argId,

}

function parseYear(v) { return v ? parseInt(v, 10) : null; }

const allYears = new Set();
[...DATA.entities, ...DATA.relations].forEach(d => {
  const f = parseYear(d.active_from);
  const u = parseYear(d.active_until);
  if (f && !isNaN(f)) allYears.add(f);
  if (u && !isNaN(u)) allYears.add(u);
});
const sortedYears = [...allYears].sort((a, b) => a - b);
const currentYear = new Date().getFullYear();
// Ensure current year is in the list
if (!allYears.has(currentYear)) allYears.add(currentYear);
const timelineYears = [...allYears].sort((a, b) => a - b);
const minYear = timelineYears[0];
const maxYear = timelineYears[timelineYears.length - 1];

// Is item active at given year? null year = show everything
function isActiveAt(d, year) {
  if (year === null) return true;
  const from = parseYear(d.active_from);
  const until = parseYear(d.active_until);
  // No temporal data → always visible
  if (from === null && until === null) return true;
  if (from !== null && year < from) return false;
  if (until !== null && year > until) return false;
  return true;
}

// Init timeline slider
function initTimeline() {
  const slider = document.getElementById('timeSlider');
  // Position 0 = "alle jaren", 1..N = specific years
  const steps = [null, ...timelineYears];
  slider.min = 0;
  slider.max = steps.length - 1;
  // Default to current year
  const currentIdx = steps.indexOf(currentYear);
  slider.value = currentIdx >= 0 ? currentIdx : steps.length - 1;
  state.timelineYear = steps[slider.value];
  document.getElementById('timeLabel').textContent = state.timelineYear;
  document.getElementById('timeMin').textContent = minYear;
  document.getElementById('timeMax').textContent = maxYear;

  slider.addEventListener('input', () => {
    const idx = parseInt(slider.value, 10);
    state.timelineYear = steps[idx];
    document.getElementById('timeLabel').textContent =
      state.timelineYear === null ? 'Alle jaren' : state.timelineYear;
    applyFilters();
    // Ververs een open detailpaneel zodat de relatielijst het jaar volgt
    if (state.selectedNode) showDetail(state.selectedNode);
  });
}

function buildGraph() {
  // Clear
  g.selectAll('*').remove();
  if (simulation) simulation.stop();
  deselectNode();

  const isTheory = state.model === 'theory';

  // Clone data (D3 mutates it)
  let nodes, links;
  if (isTheory) {
    nodes = DATA.roles.map(r => ({ ...r }));
    links = mechLinks.map(l => ({ ...l }));
  } else {
    nodes = DATA.entities.map(e => ({ ...e }));
    links = instanceLinks.map(l => ({ ...l }));
  }

  const nodeById = new Map();
  nodes.forEach(n => nodeById.set(n.id, n));

  currentNodes = nodes;
  currentLinks = links;

  // Simulation
  const chargeStr = isTheory ? -800 : -300;
  const linkDist = isTheory ? 200 : 100;

  simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id).distance(linkDist))
    .force('charge', d3.forceManyBody().strength(chargeStr).distanceMax(isTheory ? 1000 : 600))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .force('collision', d3.forceCollide().radius(d => getRadius(d) + (isTheory ? 12 : 4)))
    .force('x', d3.forceX(width / 2).strength(0.04))
    .force('y', d3.forceY(height / 2).strength(0.04))
    .alphaDecay(isTheory ? 0.015 : 0.02);

  // Draw links (no dashed lines — timeline slider handles temporal visibility)
  const linkGroup = g.append('g').attr('class', 'links');
  linkElements = linkGroup.selectAll('line').data(links).join('line')
    .attr('stroke', d => getLinkColor(d, isTheory))
    .attr('stroke-width', d => isTheory ? 2.5 : 1 + (d.influence || 0.5) * 2.5)
    .attr('stroke-opacity', d => isTheory ? 0.5 : 0.15 + (d.certainty || 0.5) * 0.45)
    .attr('marker-end', d => {
      const color = getLinkColor(d, isTheory);
      const prefix = isTheory ? 'arrow-theory-' : 'arrow-';
      return `url(#${prefix}${color.replace('#','')})`;
    });

  // Invisible wider hit-area for clicking on edges
  const linkHitGroup = g.append('g').attr('class', 'link-hits');
  linkHitElements = linkHitGroup.selectAll('line').data(links).join('line')
    .attr('stroke', 'transparent')
    .attr('stroke-width', 14)
    .style('cursor', 'pointer')
    .on('click', (event, d) => { event.stopPropagation(); selectRelation(d); })
    .on('mouseover', (event, d) => {
      const src = typeof d.source === 'object' ? d.source : entityMap.get(d.source);
      const tgt = typeof d.target === 'object' ? d.target : entityMap.get(d.target);
      const relArgs = argsByRelation[d.id] || [];
      const counts = relArgs.length ? countStances(relArgs) : null;
      const tooltip = document.getElementById('tooltip');
      tooltip.innerHTML = `
        <div class="tt-type" style="color:${getLinkColor(d, isTheory)}">${isTheory ? (d.name || 'Mechanisme') : (RELATION_LABELS[d.relation_type] || d.relation_type)}</div>
        <div class="tt-name">${src ? src.name : '?'} → ${tgt ? tgt.name : '?'}</div>
        ${d.description ? `<div class="tt-desc">${d.description}</div>` : ''}
        ${counts ? `<div class="tt-desc" style="margin-top:4px">${counts.total} argumenten: ${counts.sup} voor, ${counts.con} tegen</div>` : ''}
        <div class="tt-desc" style="margin-top:4px;color:var(--accent)">Klik voor discussie</div>
      `;
      tooltip.classList.add('visible');
    })
    .on('mousemove', (event) => {
      const tooltip = document.getElementById('tooltip');
      tooltip.style.left = (event.clientX + 16) + 'px';
      tooltip.style.top = (event.clientY - 8) + 'px';
    })
    .on('mouseout', () => document.getElementById('tooltip').classList.remove('visible'));

  // Edge labels (theory only)
  if (isTheory) {
    const labelGroup = g.append('g').attr('class', 'edge-labels');
    edgeLabelElements = labelGroup.selectAll('text').data(links).join('text')
      .attr('class', 'edge-label')
      .text(d => d.name || '');
  } else {
    edgeLabelElements = null;
  }

  // Draw nodes
  const nodeGroup = g.append('g').attr('class', 'nodes');
  nodeElements = nodeGroup.selectAll('g').data(nodes).join('g')
    .attr('class', 'node')
    .call(d3.drag()
      .on('start', (ev, d) => { if (!ev.active) simulation.alphaTarget(0.15).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag', (ev, d) => { d.fx = ev.x; d.fy = ev.y; })
      .on('end', (ev, d) => { if (!ev.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }));

  nodeElements.append('circle')
    .attr('r', d => getRadius(d))
    .attr('fill', d => getNodeColor(d))
    .attr('stroke', d => d3.color(getNodeColor(d)).brighter(0.6))
    .attr('stroke-width', isTheory ? 2 : 1.5)
    .attr('stroke-opacity', 0.4)
    .style('cursor', 'pointer');

  nodeElements.append('text')
    .text(d => truncate(d.name, isTheory ? 22 : 18))
    .attr('dy', d => getRadius(d) + (isTheory ? 16 : 12))
    .attr('text-anchor', 'middle')
    .attr('fill', '#bbbbc8')
    .attr('font-size', d => isTheory ? '12px' : (d.degree > 8 ? '11px' : '9px'))
    .attr('font-weight', d => (isTheory || d.degree > 8) ? '500' : '400')
    .style('pointer-events', 'none')
    .style('text-shadow', '0 1px 4px rgba(0,0,0,0.8)');

  // Tick
  const linkHitLines = linkHitElements;
  simulation.on('tick', () => {
    linkElements
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    linkHitLines
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    if (edgeLabelElements) {
      edgeLabelElements
        .attr('x', d => (d.source.x + d.target.x) / 2)
        .attr('y', d => (d.source.y + d.target.y) / 2 - 6);
    }
    nodeElements.attr('transform', d => `translate(${d.x},${d.y})`);
  });

  // Events
  const tooltip = document.getElementById('tooltip');

  nodeElements
    .on('mouseover', (event, d) => {
      const isT = state.model === 'theory';
      const period = formatPeriod(d);
      tooltip.innerHTML = `
        <div class="tt-type" style="color:${getNodeColor(d)}">${isT ? FILTER_LABELS[d.category] || d.category : d.type}</div>
        <div class="tt-name">${d.name}</div>
        ${period ? `<div class="tt-desc" style="margin-bottom:4px">${period}</div>` : ''}
        ${d.description ? `<div class="tt-desc">${d.description}</div>` : ''}
        ${d.examples ? `<div class="tt-desc" style="margin-top:4px"><b>Voorbeelden:</b> ${d.examples}</div>` : ''}
      `;
      tooltip.classList.add('visible');
    })
    .on('mousemove', (event) => {
      tooltip.style.left = (event.clientX + 16) + 'px';
      tooltip.style.top = (event.clientY - 8) + 'px';
    })
    .on('mouseout', () => tooltip.classList.remove('visible'))
    .on('click', (event, d) => { event.stopPropagation(); selectNode(d); });

  svgEl.on('click', () => deselectNode());

  // Zoom fit
  setTimeout(() => {
    svgEl.transition().duration(600).call(zoom.transform, d3.zoomIdentity
      .translate(width * 0.1, height * 0.1).scale(isTheory ? 0.7 : 0.8));
  }, 100);

  applyFilters();
}

// ============================================================
// HELPERS
// ============================================================
function getRadius(d) {
  if (state.model === 'theory') return 12 + Math.sqrt(d.degree || 1) * 5;
  return 5 + Math.sqrt(d.degree || 1) * 3;
}

function getNodeColor(d) {
  if (state.model === 'theory') {
    return FILTER_COLORS[d.category] || FILTER_COLORS.overig;
  }
  if (state.colorMode === 'filter') return FILTER_COLORS[d.filterCat] || FILTER_COLORS.overig;
  return TYPE_COLORS[d.type] || '#7f8c8f';
}

function getLinkColor(d, isTheory) {
  if (isTheory) return FILTER_COLORS[d.filter] || '#556';
  const src = typeof d.source === 'object' ? d.source : entityMap.get(d.source);
  return src ? (FILTER_COLORS[src.filterCat] || '#445') : '#445';
}

function truncate(s, n) { return s.length > n ? s.slice(0, n-1) + '…' : s; }

function formatPeriod(d) {
  if (!d.active_from && !d.active_until) return '';
  const from = d.active_from || '…';
  const until = d.active_until || 'heden';
  const isActive = d.active !== 0 && d.active !== false;
  const badge = isActive ? '<span class="temporal-badge active">actief</span>' : '<span class="temporal-badge inactive">inactief</span>';
  return `${from} – ${until} ${badge}`;
}

// ============================================================
// RELATIE DETAIL (discussieboom)
// ============================================================
function selectRelation(r) {
  const panel = document.getElementById('detail');
  const content = document.getElementById('detailContent');
  const src = typeof r.source === 'object' ? r.source : entityMap.get(r.source_id || r.source);
  const tgt = typeof r.target === 'object' ? r.target : entityMap.get(r.target_id || r.target);
  const srcName = src ? src.name : (r.source_name || '?');
  const tgtName = tgt ? tgt.name : (r.target_name || '?');
  const certPct = Math.round((r.certainty || 0) * 100);
  const inflPct = Math.round((r.influence || 0) * 100);
  const color = getLinkColor(r, state.model === 'theory');
  const period = formatPeriod(r);

  let html = `
    <div class="detail-header">
      <div class="entity-type" style="color:${color}">${RELATION_LABELS[r.relation_type] || r.relation_type}${r.mechanism_name ? ' · ' + r.mechanism_name : ''}</div>
      <h2>${srcName} → ${tgtName}</h2>
      ${period ? `<div class="temporal-period">${period}</div>` : ''}
    </div>
    ${r.description ? `<div class="detail-description">${r.description}</div>` : ''}
    <div class="detail-section">
      <h4>Scores</h4>
      <div style="display:flex;gap:16px;margin-bottom:12px">
        <span class="score-bar">zekerheid <span class="bar-track"><span class="bar-fill" style="width:${certPct}%;background:var(--accent)"></span></span> ${certPct}%</span>
        <span class="score-bar">invloed <span class="bar-track"><span class="bar-fill" style="width:${inflPct}%;background:var(--c-advertentie)"></span></span> ${inflPct}%</span>
      </div>
    </div>
  `;

  // Discussieboom
  const relArgs = argsByRelation[r.id];
  if (relArgs && relArgs.length) {
    html += `<div class="detail-section"><h4>Discussie</h4>`;
    html += renderArgTree(relArgs);
    html += `</div>`;
  } else {
    html += `<div class="detail-section"><h4>Discussie</h4>
      <div style="font-size:11px;color:var(--text-muted);padding:8px 0">Nog geen argumenten voor deze relatie.</div>
    </div>`;
  }

  // Formulier voor nieuw root-argument
  html += `<div class="detail-section">
    <button class="arg-toggle" id="new-arg-toggle-rel" onclick="
      let slot=document.getElementById('new-arg-slot-rel');
      if(slot.children.length===0){
        slot.innerHTML=renderArgForm({relation_id:${r.id}});
        this.textContent='Verberg formulier ▾';
      } else {
        slot.innerHTML='';
        this.textContent='+ Argument toevoegen ▸';
      }
    ">+ Argument toevoegen ▸</button>
    <div id="new-arg-slot-rel"></div>
  </div>`;

  // Terug-knop naar entiteit
  if (src) {
    html += `<div style="margin-top:12px"><button class="arg-toggle" onclick="selectNode(currentNodes.find(n=>n.id===${src.id}))">← ${srcName}</button></div>`;
  }

  content.innerHTML = html;
  panel.classList.add('open');
}

// ============================================================
// SELECTION
// ============================================================
function selectNode(d) {
  state.selectedNode = d;
  const isTheory = state.model === 'theory';

  // Only links that pass the current filters/timeline can be highlighted/hovered
  const { visibleLinkSet } = computeVisibleLinks();

  // A link counts as "connected" only when it touches d AND is currently visible
  const isConnected = (l, i) => visibleLinkSet.has(i) &&
    ((typeof l.source === 'object' ? l.source.id : l.source) === d.id ||
     (typeof l.target === 'object' ? l.target.id : l.target) === d.id);

  const connectedIds = new Set([d.id]);
  currentLinks.forEach((l, i) => {
    if (!isConnected(l, i)) return;
    const sid = typeof l.source === 'object' ? l.source.id : l.source;
    const tid = typeof l.target === 'object' ? l.target.id : l.target;
    connectedIds.add(sid);
    connectedIds.add(tid);
  });

  nodeElements.select('circle').attr('opacity', n => connectedIds.has(n.id) ? 1 : 0.08);
  nodeElements.select('text').attr('opacity', n => connectedIds.has(n.id) ? 1 : 0.06);
  linkElements.each(function(l, i) {
    const connected = isConnected(l, i);
    const el = d3.select(this);
    el.attr('stroke-opacity', connected ? 0.8 : 0.03);
    el.attr('marker-end', connected ? el.attr('marker-end') || 'none' : 'none');
    // Store original marker so we can restore it
    if (connected && !el.attr('data-marker')) {
      const color = getLinkColor(l, isTheory);
      const prefix = isTheory ? 'arrow-theory-' : 'arrow-';
      el.attr('data-marker', `url(#${prefix}${color.replace('#','')})`);
    }
    if (connected) el.attr('marker-end', el.attr('data-marker'));
  });
  // Only connected + visible relations stay hoverable (tooltips live on the hit-lines)
  if (linkHitElements) {
    linkHitElements.style('pointer-events', (l, i) => isConnected(l, i) ? 'auto' : 'none');
  }
  if (edgeLabelElements) {
    edgeLabelElements.attr('opacity', (l, i) => isConnected(l, i) ? 1 : 0.1);
  }

  showDetail(d);
}

function deselectNode() {
  state.selectedNode = null;
  // Re-apply filters so timeline visibility is respected
  applyFilters();
  document.getElementById('detail').classList.remove('open');
}

function showDetail(d) {
  const panel = document.getElementById('detail');
  const content = document.getElementById('detailContent');
  const color = getNodeColor(d);
  const isTheory = state.model === 'theory';

  if (isTheory) {
    showTheoryDetail(d, content, color);
  } else {
    showInstanceDetail(d, content, color);
  }
  panel.classList.add('open');
}

function showTheoryDetail(d, content, color) {
  const outMechs = currentLinks.filter(l => {
    const sid = typeof l.source === 'object' ? l.source.id : l.source;
    return sid === d.id;
  });
  const inMechs = currentLinks.filter(l => {
    const tid = typeof l.target === 'object' ? l.target.id : l.target;
    return tid === d.id;
  });

  // Count entities that have this role
  const entityCount = DATA.entities.filter(e => e.role_name === d.name).length;

  let html = `
    <div class="detail-header">
      <div class="entity-type" style="color:${color}">${FILTER_LABELS[d.category] || d.category}</div>
      <h2>${d.name}</h2>
    </div>
    <div class="detail-description">${d.description || ''}</div>
  `;

  if (d.examples) {
    html += `<div class="detail-section">
      <h4>Voorbeelden</h4>
      <div style="font-size:12px;color:var(--text-dim);line-height:1.6">${d.examples}</div>
    </div>`;
  }

  if (entityCount > 0) {
    html += `<div class="detail-section">
      <h4>Concrete entiteiten met deze rol (${entityCount})</h4>`;
    DATA.entities.filter(e => e.role_name === d.name).forEach(e => {
      html += `<div class="relation-card">
        <div class="rel-name">${e.name}</div>
        <div style="font-size:10px;color:var(--text-muted)">${e.type}</div>
      </div>`;
    });
    html += `</div>`;
  }

  if (outMechs.length) {
    html += `<div class="detail-section"><h4>Uitgaande mechanismen (${outMechs.length})</h4>`;
    outMechs.forEach(m => {
      const tgt = typeof m.target === 'object' ? m.target : roleMap.get(m.target);
      html += mechCard(m, tgt ? tgt.name : '?', 'naar');
    });
    html += `</div>`;
  }

  if (inMechs.length) {
    html += `<div class="detail-section"><h4>Inkomende mechanismen (${inMechs.length})</h4>`;
    inMechs.forEach(m => {
      const src = typeof m.source === 'object' ? m.source : roleMap.get(m.source);
      html += mechCard(m, src ? src.name : '?', 'van');
    });
    html += `</div>`;
  }

  content.innerHTML = html;
}

function mechCard(m, otherName, direction) {
  return `
    <div class="relation-card">
      <div class="rel-name" style="color:${FILTER_COLORS[m.filter] || 'var(--text)'}">${m.name}</div>
      <div style="font-size:11px;color:var(--text-dim);margin:3px 0">${direction} ${otherName}</div>
      <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px">${m.description || ''}</div>
      ${m.effect ? `<div style="font-size:11px;color:var(--c-advertentie);margin-top:4px"><b>Effect:</b> ${m.effect}</div>` : ''}
    </div>`;
}

function showInstanceDetail(d, content, color) {
  const outgoing = currentLinks.filter(l => {
    const sid = typeof l.source === 'object' ? l.source.id : l.source;
    return sid === d.id && isActiveAt(l, state.timelineYear);
  });
  const incoming = currentLinks.filter(l => {
    const tid = typeof l.target === 'object' ? l.target.id : l.target;
    return tid === d.id && isActiveAt(l, state.timelineYear);
  });

  const period = formatPeriod(d);
  let html = `
    <div class="detail-header">
      <div class="entity-type" style="color:${color}">${d.type} · ${d.filterCat}</div>
      <h2>${d.name}</h2>
      ${period ? `<div class="temporal-period">${period}</div>` : ''}
    </div>
  `;
  if (d.description) html += `<div class="detail-description">${d.description}</div>`;
  if (d.role_name) {
    html += `<div class="detail-section"><h4>Rol</h4>
      <div style="font-size:12px;color:var(--text-dim)">${d.role_name}</div></div>`;
  }
  if (outgoing.length) {
    html += `<div class="detail-section"><h4>Uitgaande relaties (${outgoing.length})</h4>`;
    outgoing.forEach(r => {
      const tgt = typeof r.target === 'object' ? r.target : entityMap.get(r.target);
      html += relationCard(tgt ? tgt.name : '?', r, 'naar');
    });
    html += `</div>`;
  }
  if (incoming.length) {
    html += `<div class="detail-section"><h4>Inkomende relaties (${incoming.length})</h4>`;
    incoming.forEach(r => {
      const src = typeof r.source === 'object' ? r.source : entityMap.get(r.source);
      html += relationCard(src ? src.name : '?', r, 'van');
    });
    html += `</div>`;
  }

  // Discussieboom voor deze entiteit
  const entityArgs = argsByEntity[d.id];
  if (entityArgs && entityArgs.length) {
    html += `<div class="detail-section"><h4>Discussie over ${d.name}</h4>`;
    html += renderArgTree(entityArgs);
    html += `</div>`;
  }

  // Formulier voor nieuw argument over deze entiteit
  html += `<div class="detail-section">
    <button class="arg-toggle" id="new-arg-toggle-ent" onclick="
      let slot=document.getElementById('new-arg-slot-ent');
      if(slot.children.length===0){
        slot.innerHTML=renderArgForm({entity_id:${d.id}});
        this.textContent='Verberg formulier ▾';
      } else {
        slot.innerHTML='';
        this.textContent='+ Argument toevoegen ▸';
      }
    ">+ Argument toevoegen ▸</button>
    <div id="new-arg-slot-ent"></div>
  </div>`;

  content.innerHTML = html;
}

function relationCard(otherName, r, direction) {
  const certPct = Math.round((r.certainty || 0) * 100);
  const inflPct = Math.round((r.influence || 0) * 100);
  const relArgs = argsByRelation[r.id];
  const argCount = relArgs ? countStances(relArgs) : null;
  const argBadge = argCount ? `<span style="font-size:10px;color:var(--text-muted);margin-left:auto;white-space:nowrap">${argCount.total} arg · <span style="color:#2ecc71">${argCount.sup}+</span> <span style="color:#e74c3c">${argCount.con}−</span></span>` : '';

  // Store relation data so we can retrieve it on click
  const relDataId = `rel-data-${r.id}`;

  return `
    <div class="relation-card" onclick="selectRelation(currentLinks.find(l=>l.id===${r.id}) || DATA.relations.find(l=>l.id===${r.id}))" style="cursor:pointer">
      <div style="display:flex;align-items:center">
        <div class="rel-name">${direction} ${otherName}</div>
        ${argBadge}
      </div>
      <div style="font-size:11px;color:var(--text-dim);margin:3px 0">
        ${RELATION_LABELS[r.relation_type] || r.relation_type}
        ${r.mechanism_name ? ` · ${r.mechanism_name}` : ''}
      </div>
      <div class="rel-meta">
        <span class="score-bar">zekerheid <span class="bar-track"><span class="bar-fill" style="width:${certPct}%;background:var(--accent)"></span></span> ${certPct}%</span>
        <span class="score-bar">invloed <span class="bar-track"><span class="bar-fill" style="width:${inflPct}%;background:var(--c-advertentie)"></span></span> ${inflPct}%</span>
      </div>
    </div>`;
}

// ============================================================
// FILTERING
// ============================================================
// Compute which nodes/links pass the current category + search + timeline + threshold filters.
// Returns { nodePassesFilter: Map<id,bool>, visibleLinkSet: Set<index> }.
// Shared by applyFilters and selectNode so selection respects the same visibility rules.
function computeVisibleLinks() {
  const isTheory = state.model === 'theory';
  const cf = state.certMin;
  const inf = state.inflMin;
  const filters = state.activeFilters;
  const search = state.searchTerm.toLowerCase();
  const year = state.timelineYear;

  const nodePassesFilter = new Map();
  currentNodes.forEach(n => {
    const cat = isTheory ? n.category : n.filterCat;
    const matchFilter = filters.has(cat);
    const matchSearch = !search || n.name.toLowerCase().includes(search)
      || (n.description && n.description.toLowerCase().includes(search));
    const matchTime = isTheory || isActiveAt(n, year);
    nodePassesFilter.set(n.id, matchFilter && matchSearch && matchTime);
  });

  const visibleLinkSet = new Set();
  currentLinks.forEach((l, i) => {
    const sid = typeof l.source === 'object' ? l.source.id : l.source;
    const tid = typeof l.target === 'object' ? l.target.id : l.target;
    if (!nodePassesFilter.get(sid) || !nodePassesFilter.get(tid)) return;
    if (!isTheory) {
      if ((l.certainty||0) < cf || (l.influence||0) < inf) return;
      if (!isActiveAt(l, year)) return;
    }
    visibleLinkSet.add(i);
  });

  return { nodePassesFilter, visibleLinkSet };
}

function applyFilters() {
  if (!nodeElements || !linkElements) return;
  const isTheory = state.model === 'theory';
  const search = state.searchTerm.toLowerCase();

  // Steps 1 & 2: nodes/links that pass category + search + timeline + thresholds
  const { nodePassesFilter, visibleLinkSet } = computeVisibleLinks();

  // Step 3: Nodes are visible only if they have at least one visible link
  // (or match a search term — search hits stay visible even without links)
  const nodesWithVisibleLinks = new Set();
  currentLinks.forEach((l, i) => {
    if (!visibleLinkSet.has(i)) return;
    const sid = typeof l.source === 'object' ? l.source.id : l.source;
    const tid = typeof l.target === 'object' ? l.target.id : l.target;
    nodesWithVisibleLinks.add(sid);
    nodesWithVisibleLinks.add(tid);
  });

  // When searching, also show connected neighbours of search hits
  const visibleNodes = new Set();
  if (search) {
    currentNodes.forEach(n => {
      if (nodePassesFilter.get(n.id)) visibleNodes.add(n.id);
    });
    currentLinks.forEach((l, i) => {
      if (!visibleLinkSet.has(i)) return;
      const sid = typeof l.source === 'object' ? l.source.id : l.source;
      const tid = typeof l.target === 'object' ? l.target.id : l.target;
      if (visibleNodes.has(sid)) visibleNodes.add(tid);
      if (visibleNodes.has(tid)) visibleNodes.add(sid);
    });
  } else {
    nodesWithVisibleLinks.forEach(id => visibleNodes.add(id));
  }

  // Step 4: Apply visibility to nodes
  nodeElements.select('circle').attr('opacity', d => visibleNodes.has(d.id) ? 1 : 0);
  nodeElements.select('text').attr('opacity', d => visibleNodes.has(d.id) ? 1 : 0);
  nodeElements.style('pointer-events', d => visibleNodes.has(d.id) ? 'all' : 'none');

  // Step 5: Apply visibility to links — including marker-end
  linkElements
    .attr('stroke-opacity', (l, i) => {
      if (!visibleLinkSet.has(i)) return 0;
      if (isTheory) return 0.5;
      return 0.15 + (l.certainty||0.5) * 0.45;
    })
    .attr('marker-end', (l, i) => {
      if (!visibleLinkSet.has(i)) return 'none';
      const color = getLinkColor(l, isTheory);
      const prefix = isTheory ? 'arrow-theory-' : 'arrow-';
      return `url(#${prefix}${color.replace('#','')})`;
    });

  // Verborgen links niet hoverbaar: tooltip-handlers zitten op de hit-lijnen,
  // dus pointer-events daar uitschakelen voor uitgefilterde/verleden relaties
  if (linkHitElements) {
    linkHitElements.style('pointer-events', (l, i) => visibleLinkSet.has(i) ? 'auto' : 'none');
  }

  if (edgeLabelElements) {
    edgeLabelElements
      .attr('opacity', (l, i) => visibleLinkSet.has(i) ? 1 : 0)
      .style('pointer-events', (l, i) => visibleLinkSet.has(i) ? 'auto' : 'none');
  }

  // Stats — count only visible
  const nodeLabel = isTheory ? 'rollen' : 'entiteiten';
  const linkLabel = isTheory ? 'mechanismen' : 'relaties';
  document.getElementById('stats').innerHTML = `
    <span><span class="num">${visibleNodes.size}</span> ${nodeLabel}</span>
    <span><span class="num">${visibleLinkSet.size}</span> ${linkLabel}</span>
  `;
}

// Filter chips
const chipContainer = document.getElementById('filterChips');
Object.entries(FILTER_LABELS).forEach(([key, label]) => {
  const chip = document.createElement('div');
  chip.className = 'filter-chip active';
  chip.style.setProperty('--chip-color', FILTER_COLORS[key]);
  chip.innerHTML = `<span class="dot"></span>${label}`;
  chip.addEventListener('click', () => {
    if (state.activeFilters.has(key)) { state.activeFilters.delete(key); chip.classList.remove('active'); }
    else { state.activeFilters.add(key); chip.classList.add('active'); }
    applyFilters();
  });
  chipContainer.appendChild(chip);
});

// Legend
function renderLegend() {
  const legend = document.getElementById('legend');
  const isTheory = state.model === 'theory';
  const items = isTheory ? DATA.roles : DATA.entities;
  const colors = (isTheory || state.colorMode === 'filter') ? FILTER_COLORS : TYPE_COLORS;
  const counts = {};
  items.forEach(e => {
    const key = isTheory ? e.category : (state.colorMode === 'filter' ? e.filterCat : e.type);
    counts[key] = (counts[key] || 0) + 1;
  });
  legend.innerHTML = Object.entries(colors)
    .filter(([k]) => counts[k])
    .sort((a, b) => (counts[b[0]] || 0) - (counts[a[0]] || 0))
    .map(([key, color]) => `
      <div class="legend-item">
        <span class="swatch" style="background:${color}"></span>
        ${key}
        <span class="count">${counts[key] || 0}</span>
      </div>`).join('');
}

  btn.addEventListener('click', () => {
    document.querySelectorAll('#viewToggle button').forEach(b => b.classList.remove('active'));

    state.colorMode = btn.dataset.mode;

});

const ENTITY_TYPE_GROUPS = {
  'Personen': ['politicus','journalist','voorlichter','lobbyist','columnist','academicus',
    'mediaeigenaar','toezichthouder_persoon','advocaat','klokkenluider','persoon'],
  'Organisaties': ['partij','mediaorganisatie','persbureau','bedrijf','adverteerder','lobbygroep',
    'denktank','overheidsinstelling','toezichthouder','ngo','vakbond','omroep','elite_netwerk',
    'vermogensbeheerder','pr_bureau','platform','rechterlijke_macht','onderwijsinstelling','burgerinitiatief'],
};

function entityTypeOptions() {
  return Object.entries(ENTITY_TYPE_GROUPS).map(([grp, types]) =>
    `<optgroup label="${grp}">` +
    types.map(t => `<option value="${t}">${t.replace(/_/g, ' ')}</option>`).join('') +
    `</optgroup>`).join('');
}
function roleOptions() {
  return '<option value="">— geen —</option>' +
    DATA.roles.slice().sort((a, b) => a.name.localeCompare(b.name))
      .map(r => `<option value="${r.id}">${r.name} (${FILTER_LABELS[r.category] || r.category})</option>`).join('');
}
function entityOptions() {
  return '<option value="">— kies —</option>' +
    DATA.entities.slice().sort((a, b) => a.name.localeCompare(b.name))
      .map(e => `<option value="${e.id}">${e.name}</option>`).join('');
}
function relationTypeOptions() {
  return Object.entries(RELATION_LABELS).map(([k, v]) => `<option value="${k}">${v}</option>`).join('');
}
function mechanismOptions() {
  return '<option value="">— geen —</option>' +
    DATA.mechanisms.slice().sort((a, b) => a.name.localeCompare(b.name))
      .map(m => `<option value="${m.id}">${m.name}</option>`).join('');
}

    </div>

let addTab = 'entity';
function openAddModal(tab) {
  addTab = tab || 'entity';
  document.querySelectorAll('.modal-tabs button').forEach(b =>
    b.classList.toggle('active', b.dataset.addtab === addTab));
  document.getElementById('addModalBody').innerHTML =
    addTab === 'entity' ? entityFormHtml() : relationFormHtml();
  document.getElementById('addModal').classList.add('open');
}
function closeAddModal() {
  document.getElementById('addModal').classList.remove('open');
}

function recomputeDegrees() {
  const deg = {};
  DATA.relations.forEach(r => {
    deg[r.source_id] = (deg[r.source_id] || 0) + 1;
    deg[r.target_id] = (deg[r.target_id] || 0) + 1;
  });
  DATA.entities.forEach(e => { e.degree = deg[e.id] || 0; });
}

function addEntityToGraph(ent) {
  ent.filterCat = ent.filter_category || 'overig';
  ent.degree = 0;
  DATA.entities.push(ent);
  entityMap.set(ent.id, ent);
  if (state.model === 'instance') buildGraph();   // buildGraph roept applyFilters aan
}

function addRelationToGraph(rel) {
  DATA.relations.push(rel);
  instanceLinks.push({ ...rel, source: rel.source_id, target: rel.target_id });
  recomputeDegrees();
  if (state.model === 'instance') buildGraph();
}

async function submitEntity() {
  const msg = document.getElementById('ent-msg');
  const name = document.getElementById('ent-name').value.trim();
  if (!name) { msg.innerHTML = '<div class="form-message error">Naam is verplicht</div>'; return; }
  const body = {
    name,
    type: document.getElementById('ent-type').value,
    primary_role_id: document.getElementById('ent-role').value || null,
    description: document.getElementById('ent-desc').value.trim() || null,
    active_from: document.getElementById('ent-from').value.trim() || null,
    active_until: document.getElementById('ent-until').value.trim() || null,
    contributed_by: document.getElementById('ent-by').value.trim() || 'anoniem',
  };
  try {
    const resp = await fetch('/api/entities', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body),
    });
    const result = await resp.json();
    if (!resp.ok) { msg.innerHTML = `<div class="form-message error">${result.error || 'Fout bij opslaan'}</div>`; return; }
    addEntityToGraph(result);
    msg.innerHTML = '<div class="form-message success">Entiteit toegevoegd!</div>';
    setTimeout(() => {
      closeAddModal();
      const n = currentNodes && currentNodes.find(x => x.id === result.id);
      if (n) selectNode(n);
    }, 600);
  } catch (e) { msg.innerHTML = `<div class="form-message error">Netwerkfout: ${e.message}</div>`; }
}

async function submitRelation() {
  const msg = document.getElementById('rel-msg');
  const source_id = parseInt(document.getElementById('rel-source').value, 10) || null;
  const target_id = parseInt(document.getElementById('rel-target').value, 10) || null;
  if (!source_id || !target_id) { msg.innerHTML = '<div class="form-message error">Kies een bron en een doel</div>'; return; }
  if (source_id === target_id) { msg.innerHTML = '<div class="form-message error">Bron en doel mogen niet hetzelfde zijn</div>'; return; }
  const certRaw = document.getElementById('rel-cert').value.trim();
  const inflRaw = document.getElementById('rel-infl').value.trim();
  const body = {
    source_id, target_id,
    relation_type: document.getElementById('rel-type').value,
    mechanism_id: document.getElementById('rel-mech').value || null,
    certainty: certRaw ? Math.min(100, Math.max(0, parseFloat(certRaw))) / 100 : null,
    influence: inflRaw ? Math.min(100, Math.max(0, parseFloat(inflRaw))) / 100 : null,
    description: document.getElementById('rel-desc').value.trim() || null,
    bidirectional: document.getElementById('rel-bidir').checked,
    active_from: document.getElementById('rel-from').value.trim() || null,
    active_until: document.getElementById('rel-until').value.trim() || null,
    contributed_by: document.getElementById('rel-by').value.trim() || 'anoniem',
  };
  try {
    const resp = await fetch('/api/relations', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body),
    });
    const result = await resp.json();
    if (!resp.ok) { msg.innerHTML = `<div class="form-message error">${result.error || 'Fout bij opslaan'}</div>`; return; }
    addRelationToGraph(result);
    msg.innerHTML = '<div class="form-message success">Relatie toegevoegd!</div>';
    setTimeout(() => { closeAddModal(); selectRelation(result); }, 600);
  } catch (e) { msg.innerHTML = `<div class="form-message error">Netwerkfout: ${e.message}</div>`; }
}
